<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WaterTank – Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
  <script src="js/db.js"></script>
  <style>
    :root{--deep:#060d1a;--card:#0b1929;--border:rgba(255,255,255,.07);--cyan:#00c2d4;--cyan2:#5eead4;--white:#f0f6ff;--gray:#7a9bb5;--green:#22c55e;--orange:#f97316}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:var(--deep);color:var(--white);min-height:100vh}

    nav{display:flex;align-items:center;justify-content:space-between;padding:0 44px;height:66px;background:rgba(6,13,26,.95);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(14px)}
    .logo{display:flex;align-items:center;gap:10px;font-family:'Syne',sans-serif;font-size:20px;font-weight:800;text-decoration:none;color:var(--white)}
    .logo em{color:var(--cyan);font-style:normal}
    .nav-r{display:flex;align-items:center;gap:12px}
    .nav-user{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:20px;background:rgba(255,255,255,.05);border:1px solid var(--border);font-size:14px;color:var(--gray)}
    .nav-user b{color:var(--white)}
    .btn-out{padding:8px 18px;border-radius:8px;background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.25);color:#f43f5e;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;text-decoration:none}
    .btn-out:hover{background:rgba(244,63,94,.2)}
    .btn-admin{padding:8px 18px;border-radius:8px;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.3);color:#a78bfa;font-size:13px;font-family:'DM Sans',sans-serif;transition:all .2s;text-decoration:none}
    .btn-admin:hover{background:rgba(167,139,250,.2)}
    .btn-track{padding:8px 18px;border-radius:8px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#22c55e;font-size:13px;font-family:'DM Sans',sans-serif;transition:all .2s;text-decoration:none}
    .btn-track:hover{background:rgba(34,197,94,.2)}

    .hero{padding:46px 44px 30px;background:linear-gradient(180deg,rgba(0,194,212,.06),transparent);border-bottom:1px solid var(--border)}
    .hero h1{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;margin-bottom:6px}
    .hero h1 em{color:var(--cyan);font-style:normal}
    .hero p{color:var(--gray);font-size:15px}

    .search-row{display:flex;gap:12px;margin-top:22px;flex-wrap:wrap}
    .sw{position:relative;flex:1;min-width:200px;max-width:380px}
    .si{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
    .sw input{width:100%;padding:12px 14px 12px 38px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;color:var(--white);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
    .sw input:focus{border-color:var(--cyan)}
    .sw input::placeholder{color:var(--gray)}
    .fsel{padding:12px 16px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;color:var(--white);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer}
    .fsel option{background:#0b1929}

    .main{padding:36px 44px}
    .gh{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:22px}
    .gh h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:700}
    .gh span{color:var(--gray);font-size:14px}

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}

    .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:26px;transition:transform .2s,border-color .25s,box-shadow .25s;animation:cIn .4s ease-out both}
    @keyframes cIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .card:hover{transform:translateY(-5px);border-color:rgba(0,194,212,.35);box-shadow:0 16px 48px rgba(0,0,0,.35)}

    .ct{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
    .av{width:54px;height:54px;background:linear-gradient(135deg,rgba(0,194,212,.18),rgba(2,132,199,.25));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;border:1px solid rgba(0,194,212,.18)}
    .bon{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:var(--green);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}

    .dn{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:4px}
    .vn{color:var(--cyan);font-size:13px;font-family:monospace;letter-spacing:1px}

    .sr{display:flex;margin:16px 0;padding:14px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
    .st{flex:1;padding:0 10px;border-right:1px solid var(--border)}
    .st:first-child{padding-left:0}
    .st:last-child{border-right:none}
    .sl{color:var(--gray);font-size:10px;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
    .sv{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
    .sv.c{color:var(--cyan)}.sv.g{color:var(--green)}

    .stars{color:#fbbf24;font-size:13px;margin-bottom:16px}
    .stars span{color:var(--gray);font-size:12px;margin-left:4px}

    .btn-book{width:100%;padding:13px;background:linear-gradient(135deg,var(--cyan),#0094a8);border:none;border-radius:12px;color:#060d1a;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:.4px;transition:all .2s;text-decoration:none;display:block;text-align:center}
    .btn-book:hover{box-shadow:0 6px 20px rgba(0,194,212,.4);transform:translateY(-1px)}

    /* Loading skeleton */
    .skeleton{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:26px;height:260px;position:relative;overflow:hidden}
    .skeleton::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);animation:shimmer 1.5s infinite}
    @keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

    .empty{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--gray)}
    .empty .ei{font-size:56px;margin-bottom:14px}
    .empty h3{font-family:'Syne',sans-serif;font-size:20px;color:var(--white);margin-bottom:6px}

    @media(max-width:600px){nav,.hero,.main{padding-left:20px;padding-right:20px}.search-row{flex-direction:column}}
  </style>
</head>
<body>

<nav>
  <a class="logo" href="dashboard.html">💧 Water<em>Tank</em></a>
  <div class="nav-r">
    <div class="nav-user">👤 <b id="navName">...</b></div>
    <a href="tracking.html" class="btn-track">📦 My Orders</a>
    <a href="admin.html" class="btn-admin">⚙️ Admin</a>
    <a href="#" onclick="doLogout()" class="btn-out">Logout</a>
  </div>
</nav>

<div class="hero">
  <h1>Find Tankers <em>Near You</em></h1>
  <p>Choose a verified tanker, pick your quantity and book instantly</p>
  <div class="search-row">
    <div class="sw">
      <span class="si">🔍</span>
      <input type="text" id="srch" placeholder="Search driver or vehicle..." oninput="filterCards()"/>
    </div>
    <select class="fsel" id="capF" onchange="filterCards()">
      <option value="">All Capacities</option>
      <option value="small">Small (≤ 6,000 L)</option>
      <option value="medium">Medium (6 – 10K L)</option>
      <option value="large">Large (10,000L+)</option>
    </select>
    <select class="fsel" id="sortF" onchange="filterCards()">
      <option value="rating">Best Rated</option>
      <option value="price">Lowest Price</option>
      <option value="capacity">Highest Capacity</option>
    </select>
  </div>
</div>

<div class="main">
  <div class="gh">
    <h2>🚛 Available Tankers</h2>
    <span id="cnt">Loading...</span>
  </div>
  <div class="grid" id="grid">
    <!-- Loading skeletons -->
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>
</div>

<script>
let allTankers = [];

window.addEventListener('DOMContentLoaded', async () => {
  await initDB();
  requireLogin();
  const user = getSession();
  document.getElementById('navName').textContent = user.name;
  loadTankers();
});

function loadTankers() {
  allTankers = getTankers();
  renderCards(allTankers);
}

function renderCards(tankers) {
  const grid = document.getElementById('grid');
  const cnt  = document.getElementById('cnt');

  if (!tankers.length) {
    grid.innerHTML = `<div class="empty"><div class="ei">🚛</div><h3>No Tankers Found</h3><p>Try different filters</p></div>`;
    cnt.textContent = '0 tankers available';
    return;
  }

  cnt.textContent = `${tankers.length} tanker(s) available`;
  grid.innerHTML = tankers.map((t, i) => `
    <div class="card"
         data-name="${t.driver_name.toLowerCase()}"
         data-vehicle="${t.vehicle_number.toLowerCase()}"
         data-cap="${t.capacity_liters}"
         data-price="${t.price_per_liter}"
         data-rating="${t.rating}"
         style="animation-delay:${i * 0.07}s">
      <div class="ct">
        <div class="av">🚛</div>
        <span class="bon">● Available</span>
      </div>
      <div class="dn">${t.driver_name}</div>
      <div class="vn">${t.vehicle_number}</div>
      <div class="sr">
        <div class="st"><div class="sl">Capacity</div><div class="sv c">${Math.floor(t.capacity_liters/1000)}K L</div></div>
        <div class="st"><div class="sl">Per Liter</div><div class="sv g">₹${t.price_per_liter}</div></div>
        <div class="st"><div class="sl">City</div><div class="sv">${t.city}</div></div>
      </div>
      <div class="stars">${'★'.repeat(Math.floor(t.rating))}${'☆'.repeat(5-Math.floor(t.rating))} <span>${t.rating}/5.0</span></div>
      <a href="booking.html?id=${t.id}" class="btn-book">📋 Book This Tanker</a>
    </div>
  `).join('');
}

function filterCards() {
  const s   = document.getElementById('srch').value.toLowerCase();
  const cap = document.getElementById('capF').value;
  const srt = document.getElementById('sortF').value;

  let filtered = allTankers.filter(t => {
    const nm = !s || t.driver_name.toLowerCase().includes(s) || t.vehicle_number.toLowerCase().includes(s);
    const ci = t.capacity_liters;
    const cm = !cap
      || (cap==='small'  && ci<=6000)
      || (cap==='medium' && ci>6000 && ci<=10000)
      || (cap==='large'  && ci>10000);
    return nm && cm;
  });

  filtered.sort((a,b)=>{
    if(srt==='price')    return a.price_per_liter - b.price_per_liter;
    if(srt==='capacity') return b.capacity_liters - a.capacity_liters;
    return b.rating - a.rating;
  });

  renderCards(filtered);
}

function doLogout() {
  clearSession();
  window.location.href = 'index.html';
}
</script>
</body>
</html>
